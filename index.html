<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIKI Prayer Times</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050d0d;
            --bg-card: #0a1a18;
            --bg-card2: #0d2020;
            --teal-vivid: #00e5c3;
            --teal-mid: #00b89f;
            --teal-dark: #006e60;
            --teal-glow: rgba(0, 229, 195, 0.15);
            --teal-glow2: rgba(0, 229, 195, 0.06);
            --gold: #c9a84c;
            --gold-light: #f0d080;
            --text-primary: #e8f5f3;
            --text-secondary: #7ec8be;
            --text-muted: #3d7a72;
            --border: rgba(0, 229, 195, 0.15);
            --border-strong: rgba(0, 229, 195, 0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(0, 120, 100, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -10%;
            right: -5%;
            width: 50%;
            height: 50%;
            background: radial-gradient(ellipse, rgba(0, 80, 70, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1060px;
            margin: 0 auto;
            padding: 28px 20px 40px;
            position: relative;
            z-index: 1;
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 28px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .clock-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            pointer-events: none;
            z-index: 0;
            opacity: 0.55;
            filter: blur(1.5px);
        }

        .clock-container canvas {
            width: 130px;
            height: 130px;
        }

        @media (min-width: 600px) {
            .clock-container {
                position: absolute;
                top: 0;
                left: 0;
                transform: none;
                opacity: 1;
                filter: blur(0px);
            }
            .clock-container canvas {
                width: 80px;
                height: 80px;
            }
        }

        header h1,
        header .date-display {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        h1 span { color: var(--teal-vivid); }

        .date-display {
            font-size: 1rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* ── NEXT PRAYER ── */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

        .next-prayer {
            background: var(--bg-card);
            border: 1px solid var(--border-strong);
            border-radius: 14px;
            padding: 22px 28px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 0 40px var(--teal-glow);
            transition: border-color 0.4s, box-shadow 0.4s;
            animation: fadeIn 0.4s ease;
        }

        .next-prayer h2 {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--teal-mid);
            margin-bottom: 8px;
            font-weight: 400;
        }

        .next-prayer-name {
            font-size: 1.9rem;
            font-family: 'Cinzel', serif;
            color: var(--teal-vivid);
        }

        .next-prayer-in {
            font-size: 1rem;
            color: var(--text-secondary);
            margin: 0 8px;
        }

        .countdown {
            font-size: 2.6rem;
            font-weight: 300;
            color: #fff;
            letter-spacing: 0.05em;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }

        /* ── PRAYER GRID ── */
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--teal-mid);
            margin-bottom: 16px;
            font-weight: 400;
        }

        .daily-prayers {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .prayer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px;
        }

        .prayer-card {
            background: var(--bg-card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 12px;
            text-align: center;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .prayer-card:hover {
            border-color: var(--teal-mid);
            box-shadow: 0 0 18px var(--teal-glow);
        }

        .prayer-card.active {
            border-color: var(--teal-vivid);
            box-shadow: 0 0 20px var(--teal-glow);
        }

        .prayer-name {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .prayer-time {
            font-size: 1.4rem;
            font-weight: 300;
            color: var(--text-primary);
        }

        /* ── INSPIRATION ── */
        .daily-inspiration {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 680px) {
            .daily-inspiration { grid-template-columns: 1fr; }
        }

        .inspiration-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .inspiration-box::after {
            content: '';
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--teal-glow) 0%, transparent 70%);
            pointer-events: none;
        }

        .inspiration-box h3 {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--teal-mid);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
        }

        .refresh-button {
            background: rgba(0, 229, 195, 0.08);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-left: auto;
            font-size: 0.85rem;
            transition: all 0.25s;
            flex-shrink: 0;
        }

        .refresh-button:hover {
            background: var(--teal-glow);
            border-color: var(--teal-mid);
            transform: rotate(180deg);
        }

        .arabic-text {
            font-family: 'Amiri', 'Traditional Arabic', serif;
            direction: rtl;
            line-height: 2.2;
            font-size: 1.6rem;
            color: var(--gold-light);
            margin-bottom: 14px;
            text-align: right;
        }

        .inspiration-text {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-primary);
            font-style: italic;
            margin-bottom: 10px;
        }

        .inspiration-source {
            font-size: 0.8rem;
            color: var(--teal-mid);
            font-family: 'Cinzel', serif;
            letter-spacing: 0.08em;
        }

        .loading { color: var(--text-muted); font-style: italic; }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        canvas { display: block; }
    </style>
</head>
<body>
<div class="container">

    <!-- HEADER -->
    <header>
        <div class="clock-container">
            <canvas id="clock" width="80" height="80"></canvas>
        </div>
        <h1>GIKI <span>Prayer</span> Timings</h1>
        <div class="date-display">Today: <span id="current-date"></span></div>
    </header>

    <!-- NEXT PRAYER BOX -->
    <div class="next-prayer" id="next-prayer-container">
        <h2>Next Prayer</h2>
        <div>
            <span class="next-prayer-name" id="next-prayer-name">—</span>
            <span class="next-prayer-in">in</span>
        </div>
        <div class="countdown" id="countdown">00:00:00</div>
    </div>

    <!-- DAILY PRAYER TIMES -->
    <div class="daily-prayers">
        <div class="section-title">Daily Prayer Timings · Students' Mosque GIKI</div>
        <div class="prayer-grid">
            <div class="prayer-card" id="card-fajr">
                <div class="prayer-name">Fajr</div>
                <div class="prayer-time" id="today-fajr">5:30 AM</div>
            </div>
            <div class="prayer-card" id="card-dhuhr">
                <div class="prayer-name">Dhuhr</div>
                <div class="prayer-time" id="today-dhuhr">1:45 PM</div>
            </div>
            <div class="prayer-card" id="card-asr">
                <div class="prayer-name">Asr</div>
                <div class="prayer-time" id="today-asr">5:15 PM</div>
            </div>
            <div class="prayer-card" id="card-maghrib">
                <div class="prayer-name">Maghrib</div>
                <div class="prayer-time" id="today-maghrib">6:30 PM</div>
            </div>
            <div class="prayer-card" id="card-isha">
                <div class="prayer-name">Isha</div>
                <div class="prayer-time" id="today-isha">8:15 PM</div>
            </div>
            <div class="prayer-card" id="card-friday">
                <div class="prayer-name">Jumu'ah</div>
                <div class="prayer-time">1:30 PM</div>
            </div>
        </div>
    </div>

    <!-- INSPIRATION -->
    <div class="daily-inspiration">
        <div class="inspiration-box">
            <h3>
                <span>🕋</span> Quranic Verse
                <button class="refresh-button" id="refresh-quran" title="Another verse">↻</button>
            </h3>
            <div id="quran-content"><div class="loading">Loading verse…</div></div>
        </div>
        <div class="inspiration-box">
            <h3>
                <span>📜</span> Hadith of the Day
                <button class="refresh-button" id="refresh-hadith" title="Another hadith">↻</button>
            </h3>
            <div id="hadith-content"><div class="loading">Loading hadith…</div></div>
        </div>
    </div>

    <footer>
        <p>GIKI Prayer Timings · Students' Mosque</p>
    </footer>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────
const PRAYER_TIMES = {
    fajr:         "5:30 AM",
    dhuhr:        "1:45 PM",
    asr:          "5:15 PM",
    maghrib:      "6:30 PM",
    isha:         "8:15 PM",
    fridayPrayer: "1:30 PM"
};

const quranVerses = [
    {
        arabic: "يَا أَيُّهَا الَّذِينَ آمَنُوا كُتِبَ عَلَيْكُمُ الصِّيَامُ كَمَا كُتِبَ عَلَى الَّذِينَ مِن قَبْلِكُمْ لَعَلَّكُمْ تَتَّقُونَ",
        english: "O you who have believed, decreed upon you is fasting as it was decreed upon those before you that you may become righteous.",
        source: "Surah Al-Baqarah (2:183)"
    },
    {
        arabic: "شَهْرُ رَمَضَانَ الَّذِي أُنزِلَ فِيهِ الْقُرْآنُ هُدًى لِّلنَّاسِ وَبَيِّنَاتٍ مِّنَ الْهُدَىٰ وَالْفُرْقَانِ",
        english: "The month of Ramadan in which was revealed the Quran, a guidance for the people and clear proofs of guidance and criterion.",
        source: "Surah Al-Baqarah (2:185)"
    },
    {
        arabic: "وَإِذَا سَأَلَكَ عِبَادِي عَنِّي فَإِنِّي قَرِيبٌ ۖ أُجِيبُ دَعْوَةَ الدَّاعِ إِذَا دَعَانِ",
        english: "And when My servants ask you concerning Me, indeed I am near. I respond to the invocation of the supplicant when he calls upon Me.",
        source: "Surah Al-Baqarah (2:186)"
    },
    {
        arabic: "وَاسْتَعِينُوا بِالصَّبْرِ وَالصَّلَاةِ ۚ وَإِنَّهَا لَكَبِيرَةٌ إِلَّا عَلَى الْخَاشِعِينَ",
        english: "And seek help through patience and prayer, and indeed it is difficult except for the humbly submissive.",
        source: "Surah Al-Baqarah (2:45)"
    },
    {
        arabic: "الَّذِينَ آمَنُوا وَتَطْمَئِنُّ قُلُوبُهُم بِذِكْرِ اللَّهِ ۗ أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ",
        english: "Those who have believed and whose hearts are assured by the remembrance of Allah. Unquestionably, by the remembrance of Allah hearts are assured.",
        source: "Surah Ar-Ra'd (13:28)"
    },
    {
        arabic: "فَاذْكُرُونِي أَذْكُرْكُمْ وَاشْكُرُوا لِي وَلَا تَكْفُرُونِ",
        english: "So remember Me; I will remember you. And be grateful to Me and do not deny Me.",
        source: "Surah Al-Baqarah (2:152)"
    },
    {
        arabic: "وَأَقِمِ الصَّلَاةَ ۖ إِنَّ الصَّلَاةَ تَنْهَىٰ عَنِ الْفَحْشَاءِ وَالْمُنكَرِ",
        english: "Establish prayer. Indeed, prayer prohibits immorality and wrongdoing.",
        source: "Surah Al-Ankabut (29:45)"
    },
    {
        arabic: "وَاصْبِرْ وَمَا صَبْرُكَ إِلَّا بِاللَّهِ",
        english: "And be patient, and your patience is not but through Allah.",
        source: "Surah An-Nahl (16:127)"
    }
];

const hadiths = [
    {
        text: "Every deed of the son of Adam is multiplied from ten to seven hundred times. Allah said: 'Except for fasting, for it is for Me and I shall reward it Myself; he gives up his desire and his food for My sake.'",
        source: "Sahih Muslim"
    },
    {
        text: "The Prophet ﷺ said: 'Whoever fasts Ramadan out of faith and hoping for reward, his previous sins will be forgiven.'",
        source: "Sahih al-Bukhari"
    },
    {
        text: "The Prophet ﷺ said: 'There is a gate in Paradise called Al-Rayyan, through which those who fasted will enter on the Day of Resurrection, and none except them will enter through it.'",
        source: "Sahih al-Bukhari"
    },
    {
        text: "The Prophet ﷺ said: 'The fasting person has two moments of joy: when he breaks his fast he is happy, and when he meets his Lord he will be happy because of his fasting.'",
        source: "Sahih al-Bukhari"
    },
    {
        text: "The Prophet ﷺ was asked: 'Which deed is most beloved to Allah?' He said: 'Prayer at its proper time.' He was asked: 'Then what?' He said: 'Kindness to parents.' He was asked: 'Then what?' He said: 'Jihad in the cause of Allah.'",
        source: "Sahih al-Bukhari"
    },
    {
        text: "The Prophet ﷺ said: 'Whoever says SubhanAllah wa bihamdihi one hundred times a day, his sins will be wiped away even if they are like the foam of the sea.'",
        source: "Sahih al-Bukhari"
    },
    {
        text: "The Prophet ﷺ said: 'When Ramadan begins, the gates of Paradise are opened and the gates of Hell are closed, and the devils are chained.'",
        source: "Sahih al-Bukhari"
    },
    {
        text: "The Prophet ﷺ said: 'Take up good deeds only as much as you are able, for the best deeds are those done regularly even if they are few.'",
        source: "Sahih al-Bukhari"
    }
];

// ── HELPERS ───────────────────────────────────────────────
function formatDate(date) {
    return date.toLocaleDateString('en-US', { day:'numeric', month:'long', year:'numeric' });
}

function parseTimeString(timeStr) {
    const [time, period] = timeStr.split(' ');
    let [hours, minutes] = time.split(':').map(Number);
    if (period === 'PM' && hours !== 12) hours += 12;
    else if (period === 'AM' && hours === 12) hours = 0;
    const today = new Date();
    return new Date(today.getFullYear(), today.getMonth(), today.getDate(), hours, minutes, 0);
}

function formatCountdown(ms) {
    if (ms <= 0) return "00:00:00";
    const h = Math.floor(ms / 3600000);
    const min = Math.floor((ms % 3600000) / 60000);
    const sec = Math.floor((ms % 60000) / 1000);
    return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ── PRAYER COUNTDOWN ──────────────────────────────────────
function findNextPrayer() {
    const now = new Date();

    if (now.getDay() === 5) {
        const jummahTime = parseTimeString(PRAYER_TIMES.fridayPrayer);
        const fajrTime   = parseTimeString(PRAYER_TIMES.fajr);
        if (now > fajrTime && jummahTime > now) {
            return { name: "Jumu'ah", time: jummahTime };
        }
    }

    const prayers = [
        { name:'Fajr',    time: parseTimeString(PRAYER_TIMES.fajr) },
        { name:'Dhuhr',   time: parseTimeString(PRAYER_TIMES.dhuhr) },
        { name:'Asr',     time: parseTimeString(PRAYER_TIMES.asr) },
        { name:'Maghrib', time: parseTimeString(PRAYER_TIMES.maghrib) },
        { name:'Isha',    time: parseTimeString(PRAYER_TIMES.isha) }
    ];

    const future = prayers.filter(p => p.time > now);
    if (future.length === 0) {
        const tomorrow = parseTimeString(PRAYER_TIMES.fajr);
        tomorrow.setDate(tomorrow.getDate() + 1);
        return { name:'Fajr', time: tomorrow };
    }
    return future[0];
}

function updateCountdown() {
    const next = findNextPrayer();
    document.getElementById('next-prayer-name').textContent = next.name;
    document.getElementById('countdown').textContent = formatCountdown(next.time - new Date());
}

// ── TODAY DISPLAY ─────────────────────────────────────────
function updateTodayDisplay() {
    document.getElementById('current-date').textContent = formatDate(new Date());
}

// ── CLOCK ─────────────────────────────────────────────────
function drawClock() {
    const canvas = document.getElementById('clock');
    const ctx = canvas.getContext('2d');
    const r = canvas.height / 2;
    ctx.translate(r, r);
    const scale = 0.9;

    function tick() {
        ctx.clearRect(-r, -r, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.arc(0, 0, r*scale, 0, 2*Math.PI);
        ctx.fillStyle = 'rgba(0,229,195,0.06)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,229,195,0.3)';
        ctx.lineWidth = r * 0.05;
        ctx.stroke();
        for (let i=1; i<=12; i++) {
            const a = i * Math.PI/6;
            ctx.beginPath();
            ctx.arc(Math.sin(a)*r*0.76, -Math.cos(a)*r*0.76, r*0.035, 0, 2*Math.PI);
            ctx.fillStyle = 'rgba(0,229,195,0.6)';
            ctx.fill();
        }
        const now = new Date();
        const h = now.getHours()%12, m = now.getMinutes(), s = now.getSeconds();
        hand(ctx, (h*30)+(m*0.5), r*0.48, r*0.07, '#e8f5f3');
        hand(ctx, m*6, r*0.74, r*0.05, '#00e5c3');
        hand(ctx, s*6, r*0.8, r*0.02, '#c9a84c');
        ctx.beginPath();
        ctx.arc(0, 0, r*0.09, 0, 2*Math.PI);
        ctx.fillStyle = '#00e5c3';
        ctx.fill();
    }

    function hand(ctx, deg, len, w, color) {
        ctx.beginPath();
        ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.strokeStyle = color;
        const a = (deg-90)*Math.PI/180;
        ctx.moveTo(0,0);
        ctx.lineTo(len*Math.cos(a), len*Math.sin(a));
        ctx.stroke();
    }

    setInterval(tick, 1000);
    tick();
}

// ── INSPIRATION ───────────────────────────────────────────
async function fetchQuranVerse() {
    document.getElementById('quran-content').innerHTML = '<div class="loading">Loading verse…</div>';
    await new Promise(r => setTimeout(r, 300));
    const v = quranVerses[Math.floor(Math.random()*quranVerses.length)];
    document.getElementById('quran-content').innerHTML = `
        <div class="arabic-text">${v.arabic}</div>
        <div class="inspiration-text">${v.english}</div>
        <div class="inspiration-source">${v.source}</div>`;
}

async function fetchHadith() {
    document.getElementById('hadith-content').innerHTML = '<div class="loading">Loading hadith…</div>';
    await new Promise(r => setTimeout(r, 300));
    const h = hadiths[Math.floor(Math.random()*hadiths.length)];
    document.getElementById('hadith-content').innerHTML = `
        <div class="inspiration-text">${h.text}</div>
        <div class="inspiration-source">${h.source}</div>`;
}

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('load', () => {
    drawClock();
    updateTodayDisplay();
    updateCountdown();
    fetchQuranVerse();
    fetchHadith();
    setInterval(updateCountdown, 1000);
    setInterval(updateTodayDisplay, 60000);
    document.getElementById('refresh-quran').addEventListener('click', fetchQuranVerse);
    document.getElementById('refresh-hadith').addEventListener('click', fetchHadith);
});
</script>
</body>
</html>
